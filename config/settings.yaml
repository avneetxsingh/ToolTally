timing:
  flap_open_seconds: 1.2
  flap_settle_seconds: 0.6
  drawer_unlock_seconds: 5.0
  detection_cooldown_seconds: 1.0

hardware:
  mode: mock # use "raspberry_pi" on the Pi
  linearactuator: 8
  active_low: false
  servo_open_angle: 90
  servo_close_angle: 0
  flap_pins:
    plier: 17
    screwdriver: 27
    wrench: 22
  solenoid_pins:
    plier: 5
    screwdriver: 6
    wrench: 13

runtime:
  database_path: "data/tooltally.db"
  allowed_pin_suffixes:
    - "1234"
    - "5678"

detection:
  mode: manual # manual | camera
  camera_index: 0
  show_preview: true
